<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELSA - Registro de Pesaje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --celsa-red: #E30613;
            --celsa-dark: #1A1A1A;
            --celsa-light-gray: #F5F5F7;
            --celsa-border: #D1D1D6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--celsa-light-gray);
            color: var(--celsa-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Cambiado de center a flex-start para que no se rompa al crecer */
            min-height: 100vh;
            padding: 20px 0; /* Un pequeño margen superior e inferior para estética cuando crezca mucho */
        }

        .mobile-container {
            width: 100%;
            max-width: 480px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            border-radius: 12px; /* Opcional: Le da un toque más pulido si se desborda en pantallas grandes */
            overflow: visible; /* Asegura que el contenedor estire su fondo blanco con los hijos */
        }

        header {
            border-top: 4px solid var(--celsa-red);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #FFFFFF;
            border-bottom: 1px solid var(--celsa-border);
        }

        .logo-box {
            background-color: var(--celsa-red);
            color: #FFFFFF;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 3px;
            text-align: center;
            display: inline-block;
        }

        .logo-sub {
            font-size: 8px;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .app-title {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        main {
            padding: 20px;
            flex: 1 0 auto;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 4px solid var(--celsa-red);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: #8E8E93;
            font-size: 16px;
        }

        input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px 12px 12px 38px;
            font-size: 15px;
            border: 1px solid var(--celsa-border);
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--celsa-red);
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* Estilos del Frame Dinámico de Pesaje */
        .pesaje-frame {
            border: 1px solid var(--celsa-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #FAFAFC;
            position: relative;
        }

        .pesaje-frame-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pesaje-frame-title {
            font-size: 13px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
        }

        .btn-remove-frame {
            background: none;
            border: none;
            color: var(--celsa-red);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        /* Botón Añadir Circular */
        .add-frame-container {
            display: flex;
            justify-content: center;
            margin: 5px 0;
        }

        .btn-add-frame {
            background-color: #FFFFFF;
            color: var(--celsa-red);
            border: 2px solid var(--celsa-red);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .btn-add-frame:active {
            background-color: var(--celsa-red);
            color: #FFFFFF;
            transform: scale(0.95);
        }

        /* Sección de Múltiples Fotos */
        .photo-btn-trigger {
            background-color: var(--celsa-light-gray);
            border: 2px dashed var(--celsa-border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .photo-btn-trigger:active {
            background-color: #ECECED;
        }

        .photo-btn-trigger i {
            font-size: 24px;
            color: var(--celsa-red);
            margin-bottom: 6px;
        }

        .photo-btn-trigger p {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .preview-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .preview-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--celsa-border);
        }

        .preview-container img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .remove-photo-btn {
            position: absolute;
            top: 2px; right: 2px;
            background: rgba(223, 6, 19, 0.85);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--celsa-red);
            color: #FFFFFF;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(227, 6, 19, 0.2);
        }

        .btn-submit:disabled {
            background-color: #999;
            box-shadow: none;
            cursor: not-allowed;
        }

        .loading-overlay {
            display: none;
            text-align: center;
            padding: 10px;
            color: var(--celsa-red);
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <header>
        <div>
            <div class="logo-box">CELSA</div>
            <div class="logo-sub">Conductores Eléctricos</div>
        </div>
        <div class="app-title">Entrega de lingotes de cobre</div>
    </header>

    <main>
        <h2>Nuevo Registro</h2>
        
        <form id="pesajeForm">
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-calendar"></i>
                    <input type="date" id="fecha" required>
                </div>
            </div>

            <div class="form-group">
                <label>Tipo de Documento</label>
                <div style="display: flex; gap: 20px; margin-top: 5px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_doc" value="boleta" checked onchange="conmutarDocumento()"> Boleta
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_doc" value="guia" onchange="conmutarDocumento()"> Guía
                    </label>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <i id="icono-documento" class="fa-solid fa-ticket"></i>
                    <input type="text" id="numDoc" placeholder="Ej. 9778 / T005-9778" required>
                </div>
            </div>

            <div id="pesajeFramesContainer">
                </div>

            <div class="add-frame-container">
                <button type="button" class="btn-add-frame" onclick="agregarNuevoFrame()" title="Añadir pallet">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <div class="form-group">
                <label>Evidencias Fotográficas (Múltiples)</label>
                <div class="photo-btn-trigger" onclick="document.getElementById('cameraFile').click();">
                    <i class="fa-solid fa-camera"></i>
                    <p>Capturar o añadir fotografía</p>
                </div>
                <input type="file" id="cameraFile" accept="image/*" style="display: none;" onchange="procesarFoto(this)">
                
                <div class="preview-gallery" id="gallery"></div>
            </div>

            <div class="loading-overlay" id="loadingText">
                <i class="fa-solid fa-spinner fa-spin"></i> Subiendo datos y fotos a Google Drive...
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fa-solid fa-cloud-arrow-up"></i> Registrar en Drive
            </button>
        </form>
    </main>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqCvaZpXpCpBsi6-oeoDgaes4ZhqR0Sn3BU7bK9X0NSVHqz5BeQYWrNybGUewgcRxzLw/exec";

    document.getElementById('fecha').valueAsDate = new Date();
    let listaFotosBase64 = []; 
    let frameCounter = 0;

    // Generar el primer frame al iniciar la aplicación
    window.addEventListener('DOMContentLoaded', () => {
        agregarNuevoFrame();
    });

    function conmutarDocumento() {
        const tipo = document.querySelector('input[name="tipo_doc"]:checked').value;
        const icono = document.getElementById('icono-documento');
        if(tipo === 'boleta') {
            icono.className = "fa-solid fa-ticket";
        } else {
            icono.className = "fa-solid fa-file-invoice";
        }
    }

    // Añade de manera dinámica un nuevo frame de pesaje
    function agregarNuevoFrame() {
        frameCounter++;
        const container = document.getElementById('pesajeFramesContainer');
        
        const frame = document.createElement('div');
        frame.className = 'pesaje-frame';
        frame.id = `frame_${frameCounter}`;
        
        // El botón para eliminar sólo aparece a partir del segundo frame
        const deleteButton = frameCounter > 1 
            ? `<button type="button" class="btn-remove-frame" onclick="eliminarFrame(${frameCounter})"><i class="fa-solid fa-trash"></i></button>` 
            : '';

        frame.innerHTML = `
            <div class="pesaje-frame-header">
                <span class="pesaje-frame-title">Pesaje #${frameCounter}</span>
                ${deleteButton}
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>P. Bruto (kg)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-weight-scale"></i>
                        <input type="number" step="0.1" class="p_bruto" placeholder="0.0" oninput="calcularNetoFrame(this)" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tara (kg)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-box"></i>
                        <input type="number" step="0.1" class="tara" placeholder="0.0" oninput="calcularNetoFrame(this)" required>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>P. Neto (kg)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-calculator"></i>
                    <input type="number" class="p_neto" placeholder="Cálculo automático" readonly style="background-color: #F2F2F7; font-weight: 600;">
                </div>
            </div>
        `;
        container.appendChild(frame);
        renumerarFrames();
    }

    function eliminarFrame(id) {
        const frame = document.getElementById(`frame_${id}`);
        if(frame) {
            frame.remove();
            renumerarFrames();
        }
    }

    // Mantiene los títulos secuenciales ordenados si se borra un frame intermedio
    function renumerarFrames() {
        const titles = document.querySelectorAll('.pesaje-frame-title');
        titles.forEach((title, index) => {
            title.textContent = `Pallet #${index + 1}`;
        });
    }

    // Ejecuta el cálculo apuntando específicamente a los inputs hermanos del mismo bloque
    function calcularNetoFrame(inputEl) {
        const frame = inputEl.closest('.pesaje-frame');
        const bruto = parseFloat(frame.querySelector('.p_bruto').value) || 0;
        const tara = parseFloat(frame.querySelector('.tara').value) || 0;
        const neto = bruto - tara;
        frame.querySelector('.p_neto').value = neto > 0 ? neto.toFixed(1) : 0;
    }

    function procesarFoto(input) {
        if (input.files && input.files[0]) {
            const archivo = input.files[0];
            const lector = new FileReader();
            
            lector.onload = function(e) {
                const base64Data = e.target.result;
                listaFotosBase64.push({
                    base64: base64Data,
                    filename: archivo.name
                });
                renderizarGaleria();
            };
            lector.readAsDataURL(archivo);
            input.value = ""; 
        }
    }

    function renderizarGaleria() {
        const galeria = document.getElementById('gallery');
        galeria.innerHTML = ""; 
        
        listaFotosBase64.forEach((foto, indice) => {
            const contenedor = document.createElement('div');
            contenedor.className = "preview-container";
            
            const img = document.createElement('img');
            img.src = foto.base64;
            
            const btnEliminar = document.createElement('button');
            btnEliminar.className = "remove-photo-btn";
            btnEliminar.innerHTML = "×";
            btnEliminar.type = "button";
            btnEliminar.onclick = function() {
                listaFotosBase64.splice(indice, 1); 
                renderizarGaleria(); 
            };
            
            contenedor.appendChild(img);
            contenedor.appendChild(btnEliminar);
            galeria.appendChild(contenedor);
        });
    }

    document.getElementById('pesajeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingText = document.getElementById('loadingText');
        
        submitBtn.disabled = true;
        loadingText.style.display = "block";

        const tipoDoc = document.querySelector('input[name="tipo_doc"]:checked').value;
        const numDoc = document.getElementById('numDoc').value;

        // Recopilar la información de cada uno de los frames creados
        const listaPesajes = [];
        const frames = document.querySelectorAll('.pesaje-frame');
        frames.forEach(frame => {
            listaPesajes.push({
                p_bruto: frame.querySelector('.p_bruto').value,
                tara: frame.querySelector('.tara').value,
                p_neto: frame.querySelector('.p_neto').value
            });
        });

        // Enviamos el objeto con la lista estructurada
        const payload = {
            fecha: document.getElementById('fecha').value,
            tipo_documento: tipoDoc,  
            numero_documento: numDoc, 
            pesajes: listaPesajes, 
            fotos: listaFotosBase64 
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("¡Registro exitoso! Todos los pesos se guardaron en la hoja y las fotos en Drive.");
            document.getElementById('pesajeForm').reset();
            document.getElementById('fecha').valueAsDate = new Date();
            
            // Reestablecer los frames dejando solo uno limpio
            document.getElementById('pesajeFramesContainer').innerHTML = "";
            frameCounter = 0;
            agregarNuevoFrame();

            listaFotosBase64 = [];
            renderizarGaleria();
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Hubo un problema al procesar el envío.");
        })
        .finally(() => {
            submitBtn.disabled = false;
            loadingText.style.display = "none";
        });
    });
</script>
</body>
</html>
